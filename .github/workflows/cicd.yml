name: 🚀 Deploy Spirit Echo (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Criar Pacote de Deploy
        run: |
          # Organiza apenas os arquivos necessários
          mkdir build-tmp
          cp -r public/* build-tmp/
          [ -f .htaccess ] && cp .htaccess build-tmp/ || echo "Sem .htaccess"

          cd build-tmp
          zip -r ../deploy-spirit-echo.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Executar Deploy no Servidor
        run: |
          scp -o StrictHostKeyChecking=no deploy-spirit-echo.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            # Definição do caminho único
            BASE_DIR="/var/www/spirit-echo"

            # 1. Garante que a pasta de destino existe
            sudo mkdir -p ${BASE_DIR}

            # 2. Descompacta e sobrescreve os arquivos antigos (-o)
            sudo unzip -o /tmp/deploy-spirit-echo.zip -d ${BASE_DIR}

            # 3. Ajustar permissões para o Nginx (www-data)
            sudo chown -R www-data:www-data ${BASE_DIR}
            sudo chmod -R 755 ${BASE_DIR}

            # 4. Limpeza do arquivo temporário
            sudo rm /tmp/deploy-spirit-echo.zip
            
            echo "✅ Deploy Direto Finalizado!"
          EOF