<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
        
    <title>Jogo dos Espíritos com IA</title>    

    <script src="js/security.js"></script>
    <script src="js/ai-responses.js"></script>
    <script src="arquivo.js"></script>
    <link rel="shortcut icon" href="img/espirito.png" type="image/x-icon">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/diversos.css">
    
   
</head>
<body>
    <!-- 1- retire o autoplay caso não queira o som, mas desative tambem os códigos js para não dar problema
         2- caso queira mostrar o player, adicione o atributo controls na tag audio

         ***ATENÇÃO, AS POLÍTICAS DO GOOGLE CHROME, NÃO PERMITEM QUE O AUTOPLAY FUNCIONE,
         SE DESEJA QUE FUNCIONE SEM PRECISAR TECLAR USAR O ATRIBUTO "controls" E CLICAR 
         EM PLAY, PRECISA USAR OUTRO NAVEGADOR.
    -->
    <audio id="voices" src="audio/voices.mp3"></audio>
    <audio id="yt1" src="audio/yt1.mp3"></audio>
    
    <div id="container" class="container">
        

        <div class="row justify-content-center py-50">
            <div class="col-12 text-center mb-4">
                <div class="d-inline-flex align-items-center gap-3">
                    <button type="button" class="btn btn-danger btn-lg" onclick="tocarMusica()" id="btnMusica">
                        <i class="bi bi-music-note-beamed"></i> Toque a música para ambientar melhor com os espíritos
                    </button>
                    <div class="volume-control">
                        <label for="volumeSlider" class="text-white me-2">
                            <i class="bi bi-volume-up"></i>
                        </label>
                        <input type="range" id="volumeSlider" class="form-range" min="0" max="100" value="100"
                               style="width: 100px;" onchange="ajustarVolume(this.value)">
                    </div>
                </div>
            </div>
            
            <div class="col-12 text-center">
                <h2 class="text-center mb-4">Jogo dos Espíritos</h2>
            </div>

            <div class="col-12 text-center mb-5">
                <img src="img/espirito.png" alt="espiritos" class="figure-img img-fluid">
            </div>

            
            <div class="col-10 text-center">
                <h4>CUIDADO! Digite sua pergunta com respeito aos espíritos para não atrair espíritos negativos ou obsessores</h4>
                
                <input type="text" id="texto" class="form-control" onkeypress="verifica_tecla();" autofocus
                    placeholder="Se concentre, faça silêncio e pergunte o que deseja com respeito." autocomplete="off">
                <br>
                <input type="button" value="Perguntar" class="btn btn-danger" onclick="mostra_resposta()">
                <input type="button" value="Limpar" class="btn btn-warning" onclick="limpar()">


                <div id="resposta" class="py-150 m-3 esconde bg"></div>


            </div>
        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
